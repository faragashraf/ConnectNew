<div class="groups-wrap" *ngIf="form && groups.length > 0" [formGroup]="form">
  <section class="group-card" *ngFor="let group of groups; trackBy: trackByGroup">
    <header class="group-header">
      <h3>{{ getGroupDisplayName(group) }}</h3>
      <span>{{ group.fields.length }} حقل</span>
    </header>

    <div [formArrayName]="group.formArrayName" class="form-array">
      <div *ngFor="let mandFiled of getFormArrayControls(group.formArrayName); let i = index" [formGroupName]="i" style="display: contents;">
        <div *ngFor="let ctrlName of getControlNamesFromGroup(mandFiled)" style="display: contents;">
          <app-generic-form-array
            [controlFullName]="ctrlName"
            [index]="i"
            [filtered_CategoryMand]="group.fields"
            [isDivDisabled]="readOnly"
            [ticketForm]="form"
            [mandFileds]="getFormArrayInstance(group.formArrayName)!"
            (genericEvent)="onGenericEvent($event)">
          </app-generic-form-array>
        </div>
      </div>
    </div>
  </section>
</div>

<p class="empty-text" *ngIf="!groups || groups.length === 0">
  لا توجد حقول ديناميكية مهيأة لهذا النوع.
</p>
