<section class="freeze-page-shell">
  <header class="head">
    <div>
      <h2>إنشاء تجميد وحدات</h2>
      <p>حدد المصيف والفوج والسعة وعدد الوحدات المطلوب تجميدها.</p>
    </div>
    <button type="button" class="ghost" (click)="onCancel()">العودة للقائمة</button>
  </header>

  <div class="loading-note" *ngIf="loadingDestinations">جاري تحميل بيانات المصايف...</div>
  <p class="error" *ngIf="!loadingDestinations && destinationsError.length > 0">{{ destinationsError }}</p>

  <app-freeze-form
    *ngIf="!loadingDestinations && destinations.length > 0"
    [destinations]="destinations"
    [submitLoading]="submitLoading"
    [submitLabel]="'تنفيذ التجميد'"
    (formSubmitted)="onSubmit($event)"
    (formCancelled)="onCancel()">
  </app-freeze-form>

  <p class="empty" *ngIf="!loadingDestinations && destinations.length === 0 && destinationsError.length === 0">
    لا توجد مصايف متاحة حالياً.
  </p>
</section>
