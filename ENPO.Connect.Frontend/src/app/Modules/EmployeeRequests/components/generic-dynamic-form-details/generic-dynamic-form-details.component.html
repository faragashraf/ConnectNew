<section class="summer-form-lite" dir="rtl">
  <form [formGroup]="ticketForm" (ngSubmit)="onSubmitClick()">
    <div class="groups-stack" *ngIf="genericFormService.dynamicGroups.length > 0; else emptyState">
      <article class="group-card" *ngFor="let group of genericFormService.dynamicGroups">
        <header class="group-head">
          <h4>{{ group.groupName }}</h4>
          <button
            *ngIf="group.isExtendable && !config?.fieldsConfiguration?.isDivDisabled"
            type="button"
            class="mini-btn"
            (click)="duplicateGroup(group.groupId, group.fields.length)">
            إضافة مرافق
          </button>
        </header>

        <section class="group-instance">
          <div [formArrayName]="group.formArrayName" class="form-array-grid">
            <div
              *ngFor="let mandFiled of getFormArrayControls(group.formArrayName); let i = index"
              [formGroupName]="i"
              class="group-row">
              <ng-container *ngFor="let ctrlName of genericFormService.getControlNamesFromGroup(mandFiled)">
                <app-generic-form-array
                  [controlFullName]="ctrlName"
                  [index]="i"
                  [filtered_CategoryMand]="group.fields"
                  [isDivDisabled]="!!config.fieldsConfiguration.isDivDisabled"
                  [isCurrentUser]="isCurrentUser"
                  [ticketForm]="ticketForm"
                  [mandFileds]="getFormArrayInstance(group.formArrayName)!"
                  [useDefaultRadioView]="config.fieldsConfiguration.useDefaultRadioView !== false"
                  [dateFormat]="config.fieldsConfiguration.dateFormat"
                  [showTime]="!!config.fieldsConfiguration.showTime"
                  [timeOnly]="!!config.fieldsConfiguration.timeOnly"
                  [maxDate]="config.fieldsConfiguration.maxDate"
                  [tree]="unitTree"
                  [layoutRow]="true"
                  [isNotRequired]="!!config.fieldsConfiguration.isNotRequired"
                  (genericEvent)="handleEvent($event)">
                </app-generic-form-array>
              </ng-container>
            </div>
          </div>
        </section>

        <section class="group-instance nested" *ngFor="let instance of group.instances ?? []">
          <header class="instance-head">
            <span>{{ group.groupName }}</span>
            <button type="button" class="mini-btn danger" (click)="deleteGroup(instance.groupId)">حذف</button>
          </header>

          <div [formArrayName]="instance.formArrayName" class="form-array-grid">
            <div
              *ngFor="let mandFiled of getFormArrayControls(instance.formArrayName); let i = index"
              [formGroupName]="i"
              class="group-row">
              <ng-container *ngFor="let ctrlName of genericFormService.getControlNamesFromGroup(mandFiled)">
                <app-generic-form-array
                  [controlFullName]="ctrlName"
                  [index]="i"
                  [filtered_CategoryMand]="instance.fields"
                  [isDivDisabled]="!!config.fieldsConfiguration.isDivDisabled"
                  [isCurrentUser]="isCurrentUser"
                  [ticketForm]="ticketForm"
                  [mandFileds]="getFormArrayInstance(instance.formArrayName)!"
                  [useDefaultRadioView]="config.fieldsConfiguration.useDefaultRadioView !== false"
                  [dateFormat]="config.fieldsConfiguration.dateFormat"
                  [showTime]="!!config.fieldsConfiguration.showTime"
                  [timeOnly]="!!config.fieldsConfiguration.timeOnly"
                  [maxDate]="config.fieldsConfiguration.maxDate"
                  [tree]="unitTree"
                  [layoutRow]="true"
                  [isNotRequired]="!!config.fieldsConfiguration.isNotRequired"
                  (genericEvent)="handleEvent($event)">
                </app-generic-form-array>
              </ng-container>
            </div>
          </div>
        </section>
      </article>
    </div>

    <div class="attachments-block" *ngIf="config?.attachmentConfig?.showAttachmentSection">
      <app-add-attachments
        [config]="config"
        [fileParameters]="fileParameters"
        (fileUploadEvent)="onFileChange($event)">
      </app-add-attachments>
    </div>

    <div class="submit-row">
      <button
        pButton
        type="submit"
        class="save-btn"
        [disabled]="ticketForm.invalid || submitDisabled">
        {{ config.submitButtonText || 'تسجيل الطلب' }}
      </button>
    </div>
  </form>
</section>

<ng-template #emptyState>
  <div class="empty-state">
    لا توجد حقول ديناميكية متاحة.
  </div>
</ng-template>
