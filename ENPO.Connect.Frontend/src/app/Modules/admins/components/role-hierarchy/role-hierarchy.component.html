<div class="container-main role-hierarchy-page">
    <div class="row page-head">
        <div class="col-12">
            <h3 class="page-title">شجرة الصلاحيات</h3>
            <p class="page-subtitle">اختر صلاحية من الشجرة لإدارة المستخدمين أو استخدم القائمة اليمنى للإضافة والتعديل والحذف</p>
        </div>
    </div>
    <p-tabView styleClass="role-tabs">
        <p-tabPanel header="إدارة الشجرة">
            <div class="row content-grid">
                <div class="col-md-5">
                    <div class="widget panel-card tree-panel">
                        <div class="panel-title">الهيكل الوظيفي</div>
                        <p-tree [value]="treeData" selectionMode="single" [(selection)]="selectedNode" [filter]="true"
                            [contextMenu]="cm" (onNodeContextMenuSelect)="ContextMenuSelect($event)" filterPlaceholder="بحث"
                            scrollHeight="600px" (onNodeSelect)="nodeSelection($event)"
                            (onNodeUnselect)="nodeUnselection($event)" [validateDrop]="true" [draggableNodes]="true"
                            [droppableNodes]="true" draggableScope="self" droppableScope="self"
                            (onNodeDrop)="onNodeDrop($event)">
                            <ng-template let-node pTemplate="default">
                                <b>
                                    {{node.label }}
                                </b>
                            </ng-template>
                        </p-tree>
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="widget panel-card table-panel">
                        <div class="panel-title">المستخدمون المرتبطون بالدور</div>
                        <generic-table tableId="itemTable" [tableGenericData]="itemData" [_columns]="item_columns"
                            [showExportButton]="true" [showRemoveColumn]="false" [showDeleteButton]="true" [rowsPerPage]="10"
                            [dataKey]="'USER_ID'" (rowSelect)="onselectItemEvent($event)" [showEditButton]="false"
                            (rowDelete)="deleteRow($event)" [showTableContextMenu]="false"></generic-table>
                    </div>
                </div>
            </div>
        </p-tabPanel>
        <p-tabPanel header="بحث حسب رقم المستخدم">
            <div class="panel-card lookup-panel">
                <div class="panel-title">استرجاع صلاحيات المستخدم</div>
                <div class="lookup-row">
                    <label for="userIdLookup">رقم المستخدم</label>
                    <input id="userIdLookup" class="form-control" type="text" [(ngModel)]="userIdSearch"
                        placeholder="مثال: 84621" />
                </div>
                <div class="lookup-row">
                    <label for="selectedAppId">رقم التطبيق (من الشجرة)</label>
                    <input id="selectedAppId" class="form-control" type="text" [value]="getSelectedApplicationId()"
                        placeholder="اختر عقدة من الشجرة أولاً" readonly />
                    <button type="button" pButton pRipple label="استرجاع الصلاحيات" class="btn btn-primary"
                        (click)="searchUserRolesByUserId()"></button>
                </div>
                <generic-table tableId="userRolesTable" [tableGenericData]="userRolesData" [_columns]="userRolesColumns"
                    [showExportButton]="true" [showRemoveColumn]="false" [showDeleteButton]="true" [rowsPerPage]="10"
                    [dataKey]="'ROLE_ID'" [showEditButton]="false" (rowDelete)="deleteRow($event,'userRoles')"
                    [showTableContextMenu]="false"></generic-table>
            </div>
        </p-tabPanel>
    </p-tabView>
</div>
<p-contextMenu [style]="{'width':'22.5rem','direction':'ltr'}" #cm [model]="items"></p-contextMenu>

<p-dialog [header]="header" [resizable]="false" [modal]="true" [maximizable]="true" appendTo="body"
    [(visible)]="dialogVisible" [style]="{width: '35vw', direction: 'rtl'}" [contentStyle]="{ 'min-height': '20vh' }">
    <form [formGroup]="frm" (submit)="submit()">
        <div class="dialog-content">
            <div class="form-group">
                <label for="NameAr">{{ _label }}</label>
                <div class="input-group">
                    <input type="text" formControlName="NameAr" id="NameAr" class="form-control"
                        [class.is-invalid]="frm.get('NameAr')?.invalid && frm.get('NameAr')?.touched">

                    <button type="button" pButton pRipple label="تحقق" class="btn btn-success"
                        [disabled]="frm.invalid || isValidated" (click)="ValidateUser()"
                        *ngIf="showValidateButton"></button>

                    <button type="submit" pButton pRipple label="تسجيل" class="btn btn-primary"
                        [disabled]="frm.invalid || isSubmitting || (!isValidated && showValidateButton)"></button>
                </div>
                <small *ngIf="frm.get('NameAr')?.invalid && frm.get('NameAr')?.touched" class="text-danger">
                    هذا الحقل مطلوب
                </small>
            </div>
            <span style="color: blue;">{{this.userName}}</span>
        </div>
    </form>
    <ng-template pTemplate="footer">
        <button type="button" pButton pRipple icon="pi pi-times" (click)="dialogVisible=false" label="إغلاق"
            class="p-button-text"></button>
    </ng-template>
</p-dialog>
<p-dialog header="إضافة صلاحية للمستخدم" [resizable]="false" [modal]="true" [maximizable]="true" appendTo="body"
    [(visible)]="dialogAssignUserVisible" [style]="{width: '35vw', direction: 'rtl'}"
    [contentStyle]="{ 'min-height': '20vh' }">
    <form [formGroup]="frm" (submit)="submit()">
        <div class="dialog-content">
            <div class="form-group">
                <label for="NameAr">اسم المستخدم</label>
                <div class="input-group">
                    <input type="text" formControlName="NameAr" id="NameAr" class="form-control"
                        [class.is-invalid]="frm.get('NameAr')?.invalid && frm.get('NameAr')?.touched">

                    <button type="button" pButton pRipple label="تحقق" class="btn btn-success"
                        [disabled]="frm.invalid || isValidated"></button>

                    <button type="submit" pButton pRipple label="تسجيل" class="btn btn-primary"
                        [disabled]="frm.invalid || isSubmitting || !isValidated"></button>
                </div>
                <small *ngIf="frm.get('NameAr')?.invalid && frm.get('NameAr')?.touched" class="text-danger">
                    هذا الحقل مطلوب
                </small>
            </div>
        </div>
    </form>
    <ng-template pTemplate="footer">
        <button type="button" pButton pRipple icon="pi pi-times" (click)="dialogVisible=false" label="إغلاق"
            class="p-button-text"></button>
    </ng-template>
</p-dialog>
