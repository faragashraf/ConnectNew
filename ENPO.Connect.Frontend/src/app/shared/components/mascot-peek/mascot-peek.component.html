<div class="mascot-overlay" 
     [class.visible]="isVisible" 
     [class.looking]="isLooking"
     [ngClass]="currentSideClass"
     [ngStyle]="currentPositionStyles">
    
    <div class="close-btn" (click)="dismiss()" title="إخفاء">
        <i class="pi pi-times"></i>
    </div>

    <!-- Overlay text for envelope -->
    <div class="envelope-text">رمضان كريم</div>

    <svg class="mascot-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Defs for gradients/shadows -->
        <defs>
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
            </filter>
            <linearGradient id="hatGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#009966;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#007744;stop-opacity:1" />
            </linearGradient>
        </defs>

        <g class="mascot-body-group" filter="url(#shadow)">
            <!-- Body: Green Vest/Suit -->
            <path d="M60,140 C60,110 140,110 140,140 L140,200 L60,200 Z" fill="#008855" />
            
            <!-- White Shirt Collar -->
            <path d="M85,140 L100,160 L115,140" fill="none" stroke="#FFFFFF" stroke-width="3" />
            
            <!-- Satchel Strap -->
            <path d="M140,140 L60,200" stroke="#FDB913" stroke-width="8" stroke-linecap="round" />
            
            <!-- Hand / Arm (Waving) -->
            <g class="arm-wave">
                <circle cx="150" cy="150" r="12" fill="#FFFFFF" stroke="#008855" stroke-width="2"/>
            </g>

            <!-- Head Group -->
            <g class="mascot-head-group">
                <!-- Face Shape -->
                <circle cx="100" cy="90" r="50" fill="#F5F5F5" />
                
                <!-- Cheeks -->
                <circle cx="70" cy="100" r="6" fill="#FFAAAA" opacity="0.6" />
                <circle cx="130" cy="100" r="6" fill="#FFAAAA" opacity="0.6" />

                <!-- Eyes Group (Blink Target) -->
                <g class="eyes">
                    <!-- Left Eye -->
                    <ellipse cx="80" cy="85" rx="6" ry="8" fill="#333" />
                    <circle cx="82" cy="83" r="2" fill="#FFF" />
                    
                    <!-- Right Eye -->
                    <ellipse cx="120" cy="85" rx="6" ry="8" fill="#333" />
                    <circle cx="122" cy="83" r="2" fill="#FFF" />
                </g>

                <!-- Mouth -->
                <path d="M90,110 Q100,118 110,110" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round" />

                <!-- Hat -->
                <path d="M60,65 Q100,40 140,65 Q140,55 130,50 L70,50 Q60,55 60,65" fill="url(#hatGradient)" />
                <rect x="60" y="60" width="80" height="10" rx="2" fill="#008855" /> 
                <rect x="60" y="65" width="80" height="3" fill="#FDB913" /> <!-- Yellow Stripe -->
                
                <!-- Postal Badge on Hat -->
                <circle cx="100" cy="58" r="6" fill="#FDB913" />
            </g>
        </g>
        
        <!-- Mail Envelope (Held or badge-like) -->
        <g class="envelope-badge" transform="translate(130, 170) rotate(-10)">
            <rect x="0" y="0" width="45" height="30" rx="2" fill="#EEE" stroke="#CCC" stroke-width="1"/>
            <path d="M0,0 L22.5,15 L45,0" fill="none" stroke="#CCC" stroke-width="1"/>
        </g>
    </svg>
</div>
